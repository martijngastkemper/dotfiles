set-window-option -g status-left-style 'fg=#ffffff,bg=#3b7dd8'

set-window-option -g status-right-style 'fg=#595959,bg=#ffffff'

set-window-option -g window-status-current-style 'fg=#ffffff,bg=#3b7dd8'

# Set inactive/active window styles
set -g window-style 'fg=#595959,bg=#ffffff'
set -g window-active-style 'fg=#1a1a1a,bg=#ffffff'

set -g status-style 'fg=#595959,bg=#ffffff'

set -g pane-border-style 'fg=lightgray,bg=#ffffff'
set -g pane-active-border-style 'fg=#3b7dd8,bg=#ffffff'

setenv -g TMUX_THEME light
