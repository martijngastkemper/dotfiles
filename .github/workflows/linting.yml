name: Linting

on:
  push:

permissions: {}

jobs:
  actionlint:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: make installed_brew
      - run: brew install actionlint
      - run: actionlint -color

  checkmake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: go install github.com/checkmake/checkmake/cmd/checkmake@59931d556f8f5cf4fbacf2c8390a8122ef7a881d
      - name: Run checkmake
        run: |
          "$(go env GOPATH)/bin/checkmake" Makefile

  editorconfig-checker:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: make installed_brew
      - run: brew install editorconfig-checker
      - run: editorconfig-checker

  json:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: make installed_jq
      - name: Run jq
        run: |
          find . \( -iname ".*.json" -or -iname "*.json" -or -iname ".*.jsonc" -or -iname "*.jsonc" \) -exec sh -c jq . "$1" \;

  markdownlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25
        with:
          globs: "**.md"

  plutil:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: make installed_plutil
      - run: plutil -- *.plist

  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: make installed_shellcheck
      - run: shellcheck --severity=warning -- bin/* git_template/hooks/* bash_aliases *.sh

  shfmt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: go install mvdan.cc/sh/v3/cmd/shfmt@2f3f5e36d9b0f8f14c998d50aa20a28832205ae8
      - name: "Run shfmt"
        run: |
          "$(go env GOPATH)/bin/shfmt" --diff -- bin/* git_template/hooks/* bash_aliases *.sh

  skills-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Cache token counts
        id: token-counts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .skills-lint-cache/tokens.json
          key: token-counts
      - run: make install_skills_lint
      - run: skills-lint --quiet

  zizmor:
    runs-on: macos-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: make installed_brew
      - run: brew install zizmor
      - run: zizmor --format=sarif . > results.sarif
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          sarif_file: results.sarif
          category: zizmor

  zsh-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: go install github.com/z-shell/zsh-lint/cmd/zsh-lint@61e5ec26601b5f40004e9c1fb768afee5da9c5fc
      - name: "Run zsh-lint"
        run: |
          "$(go env GOPATH)/bin/zsh-lint" ./*.zsh

  zunit:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: make installed_brew
      - run: brew install zsh
      - run: brew trust molovo/revolver
      - run: brew tap molovo/revolver
      - run: brew install zunit-zsh/zunit/zunit
      - name: Run zunit
        run: |
          # Make zunit and revolver available in the PATH
          export PATH="./bin:$PATH"
          # Fix for revolver to make it work in a non interactive shell
          export TERM="dumb"
          zunit
